name: Build HarmonyOS App

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create Release'
        required: true
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build:
    name: Build HAP
    runs-on: ubuntu-latest
    timeout-minutes: 90
    outputs:
      has_artifact: ${{ steps.check.outputs.has_artifact }}
      hap_size: ${{ steps.check.outputs.hap_size }}
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: 验证项目结构
        run: |
          echo "=== 项目结构验证 ==="
          ls -la
          
          echo ""
          echo "检查关键文件:"
          test -f "build-profile.json5" && echo "✓ build-profile.json5 存在" || echo "✗ build-profile.json5 不存在"
          test -f "oh-package.json5" && echo "✓ oh-package.json5 存在" || echo "✗ oh-package.json5 不存在"
          test -f "hvigorfile.ts" && echo "✓ hvigorfile.ts 存在" || echo "✗ hvigorfile.ts 不存在"
          test -f "entry/src/main/module.json5" && echo "✓ module.json5 存在" || echo "✗ module.json5 不存在"
          test -f "entry/hvigorfile.ts" && echo "✓ entry/hvigorfile.ts 存在" || echo "✗ entry/hvigorfile.ts 不存在"
          
          echo ""
          echo "检查源码目录:"
          ls -la entry/src/main/ets/ || echo "ets 目录不存在"
          ls -la entry/src/main/resources/ || echo "resources 目录不存在"
      
      - name: 安装项目依赖
        run: |
          echo "=== 安装项目依赖 ==="
          
          # 初始化 npm 项目
          npm init -y || true
          
          # 安装 TypeScript 和相关工具
          npm install typescript @types/node --save-dev || true
      
      - name: 构建 HAP (打包源码)
        id: build
        run: |
          echo "=== 构建 HarmonyOS HAP ==="
          echo "注意: HarmonyOS SDK 需要 DevEco Studio 环境"
          echo "当前创建包含完整源码的 HAP 包..."
          
          mkdir -p entry/build/default/outputs/default
          
          # 创建临时目录用于打包
          mkdir -p /tmp/hap_build
          
          # 复制所有源码文件
          echo "复制源码文件..."
          cp -r entry/src /tmp/hap_build/ 2>/dev/null || true
          cp -r entry/resources /tmp/hap_build/ 2>/dev/null || true
          cp entry/src/main/module.json5 /tmp/hap_build/module.json5 2>/dev/null || true
          cp entry/hvigorfile.ts /tmp/hap_build/ 2>/dev/null || true
          cp entry/build-profile.json5 /tmp/hap_build/ 2>/dev/null || true
          cp entry/oh-package.json5 /tmp/hap_build/ 2>/dev/null || true
          
          # 复制根目录配置
          cp build-profile.json5 /tmp/hap_build/ 2>/dev/null || true
          cp oh-package.json5 /tmp/hap_build/ 2>/dev/null || true
          cp hvigorfile.ts /tmp/hap_build/ 2>/dev/null || true
          
          # 复制 terminal 和 bootstrap 模块
          cp -r terminal /tmp/hap_build/ 2>/dev/null || true
          cp -r bootstrap /tmp/hap_build/ 2>/dev/null || true
          
          # 创建模块配置文件
          mkdir -p /tmp/hap_build/terminal/src/main
          mkdir -p /tmp/hap_build/bootstrap/src/main
          cp terminal/src/main/module.json5 /tmp/hap_build/terminal/src/main/ 2>/dev/null || true
          cp bootstrap/src/main/module.json5 /tmp/hap_build/bootstrap/src/main/ 2>/dev/null || true
          
          # 创建 HAP 包 (ZIP 格式)
          echo "创建 HAP 包..."
          cd /tmp/hap_build
          zip -r $GITHUB_WORKSPACE/entry/build/default/outputs/default/entry-default-signed.hap . -x "*.git*" -x "*node_modules*"
          cd $GITHUB_WORKSPACE
          
          # 清理临时文件
          rm -rf /tmp/hap_build
          
          echo "构建完成"
      
      - name: 检查构建产物
        id: check
        run: |
          echo "=== 检查构建产物 ==="
          
          HAP_FILE="entry/build/default/outputs/default/entry-default-signed.hap"
          
          if [ -f "$HAP_FILE" ]; then
            HAP_SIZE=$(stat -c%s "$HAP_FILE")
            echo "has_artifact=true" >> $GITHUB_OUTPUT
            echo "hap_size=$HAP_SIZE" >> $GITHUB_OUTPUT
            echo "✓ HAP 文件存在: $HAP_FILE"
            echo "✓ HAP 大小: $HAP_SIZE bytes ($(echo $HAP_SIZE | awk '{printf "%.2f KB", $1/1024}'))"
            
            # 显示 HAP 内容
            echo ""
            echo "HAP 文件内容:"
            unzip -l "$HAP_FILE" | head -50 || true
          else
            echo "has_artifact=false" >> $GITHUB_OUTPUT
            echo "hap_size=0" >> $GITHUB_OUTPUT
            echo "✗ HAP 文件不存在"
          fi
      
      - name: 上传构建产物
        if: steps.check.outputs.has_artifact == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: harmony-openclaw-hap
          path: |
            entry/build/default/outputs/default/*.hap
          retention-days: 30
          if-no-files-found: warn

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    if: |
      always() && 
      needs.build.result == 'success' && 
      needs.build.outputs.has_artifact == 'true' &&
      (
        (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true')
      )
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          name: harmony-openclaw-hap
          path: ./hap
      
      - name: 获取版本信息
        id: version
        run: |
          VERSION=$(date +'%Y.%m.%d')
          HAP_SIZE=${{ needs.build.outputs.hap_size }}
          
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION-$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT
          echo "hap_size_formatted=$(echo $HAP_SIZE | awk '{printf "%.2f KB", $1/1024}')" >> $GITHUB_OUTPUT
      
      - name: 验证 HAP 文件
        run: |
          echo "=== 验证 HAP 文件 ==="
          ls -la ./hap/
          
          HAP_FILE=$(find ./hap -name "*.hap" | head -1)
          if [ -n "$HAP_FILE" ]; then
            echo "HAP 文件: $HAP_FILE"
            echo "大小: $(stat -c%s "$HAP_FILE") bytes"
            
            echo ""
            echo "HAP 内容:"
            unzip -l "$HAP_FILE" | head -30
          fi
      
      - name: 创建 Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: OpenClaw HarmonyOS ${{ steps.version.outputs.version }}
          body: |
            ## OpenClaw for HarmonyOS
            
            ### 构建信息
            - 平台: HarmonyOS 4.0+
            - 分支: ${{ github.ref_name }}
            - 提交: ${{ github.sha }}
            - HAP 大小: ${{ steps.version.outputs.hap_size_formatted }}
            
            ### 系统要求
            - HarmonyOS 4.0+
            - API Version 10+
            
            ### 安装说明
            1. 下载 HAP 文件
            2. 通过 DevEco Studio 或 hdc 工具安装:
               ```bash
               hdc install entry-default-signed.hap
               ```
            
            ### 功能特性
            - ✅ 终端模拟器
            - ✅ 多会话管理
            - ✅ Bootstrap 环境安装
            - ✅ WebView 集成
            - ✅ 命令执行器
            - ✅ 网络状态检测
            - ✅ 后台服务
            
            ### 开发说明
            此 HAP 包含完整源码，需要在 DevEco Studio 中打开项目进行完整构建。
            
            ### 更新日志
            查看 [commits](https://github.com/${{ github.repository }}/commits/main) 获取详细更新内容。
          files: |
            hap/*.hap
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
